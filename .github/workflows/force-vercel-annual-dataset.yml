name: Finaliser la version annuelle Vercel

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/force-vercel-annual-dataset.yml'

permissions:
  contents: write

jobs:
  trigger-vercel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Créer un commit de déploiement unique
        run: |
          git config user.name "Hailite Deployment"
          git config user.email "actions@users.noreply.github.com"
          git commit --allow-empty -m "Déploie le scénario annuel final sur Vercel"
          git push origin HEAD:main
