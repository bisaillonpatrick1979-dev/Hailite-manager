name: Apply employee calendar upgrade

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-employee-calendar-upgrade.yml'
      - 'scripts/apply_employee_calendar_upgrade.py'

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Apply calendar updates
        run: python3 scripts/apply_employee_calendar_upgrade.py
      - name: Install dependencies
        run: npm ci
      - name: Verify TypeScript
        run: npm run lint
      - name: Verify production build
        run: npm run build
      - name: Commit verified files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Ajoute le calendrier détaillé des employés et du secrétaire
          file_pattern: src/App.tsx src/index.css src/components/EmployeeWorkCalendar.tsx
