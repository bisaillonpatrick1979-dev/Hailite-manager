name: Apply global compliance

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-global-compliance.yml'
      - 'scripts/apply_global_compliance.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Apply international compliance updates
        id: apply
        shell: bash
        run: |
          set +e
          python3 scripts/apply_global_compliance.py > global-compliance-diagnostic.log 2>&1
          status=$?
          echo "exit_code=$status" >> global-compliance-diagnostic.log
          cat global-compliance-diagnostic.log
          exit 0
      - name: Commit diagnostic report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Ajoute le diagnostic de la configuration internationale
          file_pattern: global-compliance-diagnostic.log
