name: Publier le scénario annuel validé

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/force-vercel-annual-dataset-final.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Déclencher Vercel depuis la branche validée
        run: |
          git config user.name "Hailite Deployment"
          git config user.email "actions@users.noreply.github.com"
          git commit --allow-empty -m "Publication finale du scénario annuel validé"
          git push origin HEAD:main
