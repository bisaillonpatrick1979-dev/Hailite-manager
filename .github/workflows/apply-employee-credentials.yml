name: Apply employee credentials

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-employee-credentials.yml'
      - 'scripts/apply_employee_credentials.py'

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Apply employee credential updates
        run: python3 scripts/apply_employee_credentials.py
      - name: Install dependencies
        run: npm ci
      - name: Verify TypeScript
        run: npm run lint
      - name: Verify production build
        run: npm run build
      - name: Commit verified files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Ajoute les cartes de compétence et alertes de renouvellement
          file_pattern: src/App.tsx src/types.ts src/apiClient.ts supabase/migrations/20260719170000_add_employee_credentials.sql
